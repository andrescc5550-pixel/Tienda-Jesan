<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jesan GT - Tienda</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header class="header">
        <img src="img/jesan.png" class="logo">
        <h1>JESAN</h1>
    </header>

    <main>
        <section class="productos" id="productos"></section>
    </main>

    <div id="modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:10px; text-align:center; max-width:400px;">
            <img id="imgModal" style="width:100%">
            <h2 id="tituloModal"></h2>
            <p id="precioModal"></p>
            <input type="number" id="cantidadComprar" placeholder="¿Cuántos?" style="width:80%; padding:10px; margin:10px 0;">
            <br>
            <button onclick="comprar()" style="background:green; color:white; border:none; padding:10px 20px; cursor:pointer;">Confirmar Compra</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:10px 20px; cursor:pointer; margin-left:10px;">Cerrar</button>
        </div>
    </div>

    <script>
        const API = "https://tienda-jesan.onrender.com/productos";
        let productoActual = null;

        async function cargarProductos() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const contenedor = document.getElementById("productos");
                contenedor.innerHTML = "";

                data.forEach(p => {
                    if (p.cantidad <= 0) return;
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <img src="${p.imagen || 'https://via.placeholder.com/150'}">
                        <h3>${p.nombre}</h3>
                        <span>Q${p.precio}</span>
                        <p>Disponibles: ${p.cantidad}</p>
                    `;
                    card.onclick = () => {
                        productoActual = p;
                        document.getElementById("modal").style.display = "flex";
                        document.getElementById("imgModal").src = p.imagen;
                        document.getElementById("tituloModal").innerText = p.nombre;
                        document.getElementById("precioModal").innerText = "Q" + p.precio;
                    };
                    contenedor.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function comprar() {
            const cant = document.getElementById("cantidadComprar").value;
            if (!cant || cant <= 0) return alert("Cantidad inválida");

            try {
                const res = await fetch(`https://tienda-jesan.onrender.com/comprar/${productoActual.id}`, {
                    method: "PUT",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ cantidad: Number(cant) })
                });
                const resData = await res.json();
                alert(resData.mensaje);
                location.reload();
            } catch (e) { alert("Error en compra"); }
        }

        cargarProductos();
    </script>
</body>
</html>
