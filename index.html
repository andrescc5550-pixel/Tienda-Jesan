<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesan GT</title>
<link rel="stylesheet" href="estilo.css">

<style>
/* 🔹 OCULTAR DESCRIPCIÓN */
.descripcion {
  display: none;
}

.descripcion.activo {
  display: block;
}
</style>

</head>

<body>

<header class="header">
  <img src="img/jesan.png" class="logo">
  <h1>JESAN</h1>
</header>

<main>

<section class="intro">
  <h2>La elegancia también es parte de tu personalidad</h2>
</section>

<section class="productos" id="productos"></section>

<div class="btn-container">
  <a href="mensajes.html" class="btn">Dejar un mensaje</a>
</div>

</main>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="imgModal">
    <h2 id="tituloModal"></h2>
    <p id="descModal"></p>
    <p id="precioModal"></p>

    <input type="number" id="cantidadComprar" placeholder="Cantidad">
    <button class="btn-comprar" onclick="comprar()">Comprar</button>
  </div>
</div>

<script>
const API = "http://localhost:3000/productos";
let productoActual = null;

// 🔹 CARGAR PRODUCTOS
async function cargarProductos() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const contenedor = document.getElementById("productos");
    contenedor.innerHTML = "";

    data.forEach(p => {

      if (Number(p.cantidad) <= 0) return;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.imagen || 'https://via.placeholder.com/300'}">
        <h3>${p.nombre}</h3>

        <!-- 🔹 DESCRIPCIÓN OCULTA -->
        <p class="descripcion">
          ${p.descripcion || "Producto de alta calidad"}
        </p>

        <span>Q${p.precio}</span>
      `;

      // 🔥 CLICK EN CARD
      card.addEventListener("click", (e) => {

        // 🔹 Evita que abra modal si solo quieres mostrar descripción
        if (e.target.classList.contains("descripcion")) return;

        const desc = card.querySelector(".descripcion");
        desc.classList.toggle("activo");
      });

      // 🔹 DOBLE CLICK = abrir modal (más pro)
      card.addEventListener("dblclick", () => abrirModal(p));

      contenedor.appendChild(card);
    });

  } catch (error) {
    console.error("Error cargando productos:", error);
  }
}

// 🔹 ABRIR MODAL
function abrirModal(p) {
  productoActual = p;

  document.getElementById("modal").style.display = "flex";

  document.getElementById("tituloModal").innerText = p.nombre;
  document.getElementById("descModal").innerText = p.descripcion || "Sin descripción";
  document.getElementById("precioModal").innerText = "Q" + p.precio;
  document.getElementById("imgModal").src = p.imagen || "https://via.placeholder.com/300";

  document.getElementById("cantidadComprar").value = "";
}

// 🔹 COMPRAR
async function comprar() {

  if (!productoActual) {
    alert("Error: selecciona un producto");
    return;
  }

  const cantidad = Number(document.getElementById("cantidadComprar").value);

  if (!cantidad || cantidad <= 0) {
    alert("Ingresa una cantidad válida");
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/comprar/" + productoActual.id, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cantidad })
    });

    const data = await res.json();

    alert(data.mensaje);

    document.getElementById("modal").style.display = "none";

    cargarProductos();

  } catch (error) {
    console.error("Error en compra:", error);
    alert("Error conectando con el servidor");
  }
}

// 🔹 CERRAR MODAL
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") {
    document.getElementById("modal").style.display = "none";
  }
});

// INICIO
cargarProductos();
</script>

</body>
</html>
